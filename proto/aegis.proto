syntax = "proto3";
package aegis;

service SentinelOracle {
    rpc ReportEvent (EventRequest) returns (OracleDecision);
    rpc Subscribe (SubscribeRequest) returns (stream Alert);
    rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message EventRequest {
    string event_id = 1;
    string nhi_id = 2;
    string action = 3;
    string resource_arn = 4;
    string timestamp = 5;
}

message OracleDecision {
    string decision_id = 1;
    int32 verdict = 2;
    double risk_score = 3;
    string reason = 4;
    int32 processing_time_ms = 5;
}

message SubscribeRequest {
    string agent_id = 1;
}

message Alert {
    string message = 1;
    double severity = 2;
    string timestamp = 3;
}

message HealthRequest {}

message HealthResponse {
    bool oracle_alive = 1;
    int32 active_sentinels = 2;
}
