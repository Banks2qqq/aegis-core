# Full site config for aegis-security.ru (HTTP + HTTPS + API + WebSocket)
# On VPS: /etc/nginx/sites-available/aegis

server {
    listen 80;
    server_name aegis-security.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name aegis-security.ru;

    ssl_certificate /etc/letsencrypt/live/aegis-security.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aegis-security.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/aegis/html;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # Backend health JSON — exact match must be above location /
    location = /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public alias → agent only exposes GET /health (not /api/health)
    location = /api/health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # H6 — Prometheus scrape (JWT in Authorization header)
    location = /metrics {
        proxy_pass http://127.0.0.1:8080/metrics;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/status/public {
        proxy_pass http://127.0.0.1:8080/api/status/public;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /federation/ {
        return 404;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    location /_next/static/ {
        alias /var/www/aegis/html/_next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# Federation-only listener — mandatory client mTLS (Federation CA)
server {
    listen 8443 ssl;
    server_name aegis-security.ru;

    ssl_certificate /etc/letsencrypt/live/aegis-security.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aegis-security.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_client_certificate /etc/aegis/federation/ca.pem;
    ssl_verify_depth 2;
    ssl_verify_client on;

    access_log /var/log/nginx/aegis-federation-mtls.log aegis_federation_mtls;

    location /federation/ {
        proxy_pass http://127.0.0.1:8080/federation/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
        proxy_set_header X-SSL-Client-S-DN $ssl_client_s_dn;
        proxy_set_header X-SSL-Client-Fingerprint $ssl_client_fingerprint;
        proxy_read_timeout 300s;
    }

    location / {
        return 404;
    }
}
