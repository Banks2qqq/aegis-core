# node2.aegis-security.ru — HTTPS after certbot
server {
    listen 80;
    server_name node2.aegis-security.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name node2.aegis-security.ru;

    ssl_certificate /etc/letsencrypt/live/node2.aegis-security.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/node2.aegis-security.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/aegis/html;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $host;
    }

    location = /metrics {
        proxy_pass http://127.0.0.1:8080/metrics;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location = /api/status/public {
        proxy_pass http://127.0.0.1:8080/api/status/public;
        proxy_set_header Host $host;
    }

    location /federation/ {
        return 404;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}

server {
    listen 8443 ssl;
    server_name node2.aegis-security.ru;

    ssl_certificate /etc/letsencrypt/live/node2.aegis-security.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/node2.aegis-security.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_client_certificate /etc/aegis/federation/ca.pem;
    ssl_verify_depth 2;
    ssl_verify_client on;

    access_log /var/log/nginx/aegis-federation-mtls.log aegis_federation_mtls;

    location /federation/ {
        proxy_pass http://127.0.0.1:8080/federation/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
        proxy_set_header X-SSL-Client-S-DN $ssl_client_s_dn;
        proxy_set_header X-SSL-Client-Fingerprint $ssl_client_fingerprint;
        proxy_read_timeout 300s;
    }

    location / {
        return 404;
    }
}
