# Include once: /etc/nginx/conf.d/aegis-federation-mtls-log.conf
# Federation mTLS access log (port 8443 listeners reference aegis_federation_mtls format).

log_format aegis_federation_mtls '$remote_addr [$time_local] verify=$ssl_client_verify '
    'dn="$ssl_client_s_dn" fp=$ssl_client_fingerprint "$request" $status $body_bytes_sent';
