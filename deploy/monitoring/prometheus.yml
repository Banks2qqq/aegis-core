global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: aegis-agent-primary
    metrics_path: /metrics
    scheme: http
    bearer_token_file: /etc/aegis/monitoring/bearer_token
    static_configs:
      - targets: ["127.0.0.1:8080"]
        labels:
          node: aegis-prod-primary
